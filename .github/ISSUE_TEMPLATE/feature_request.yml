name: Feature request
description: Propose a focused improvement
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What limitation or use case should this address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the smallest useful solution and any alternatives considered.
    validations:
      required: true
  - type: textarea
    id: hardware
    attributes:
      label: Hardware and safety impact
      description: List affected models and any new EC reads or writes. Enter "None" for UI-only requests.
    validations:
      required: true
  - type: checkboxes
    id: confirmation
    attributes:
      label: Confirmation
      options:
        - label: I understand this project is unofficial and hardware support varies by model.
          required: true
